databases:
  - name: eduforall-db
    databaseName: eduforall
    user: eduforall_user
    plan: free

services:
  - type: web
    name: eduforall-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn projectSchools.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eduforall-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://eduforall-web.onrender.com"
